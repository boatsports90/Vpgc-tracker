niBtn.danger{color:var(--red);border-color:#f0c7c7}.noteDone{opacity:.62;text-decoration:line-through}.dateHint{font-size:12px;color:var(--muted);font-weight:800;margin-top:4px}.dailyCell{min-width:0;word-break:break-word;text-align:center!important}.inlineHelp{background:#eef7f1;border:1px solid #cfe1d6;border-radius:14px;padding:10px;margin:8px 0;color:#34433c;font-size:13px;line-height:1.35}.chart tr.entered td{background:#e8f7ed}.chart tr.ready td{background:#f3fbf6}.chart tr.verify td{background:#fff0f0}.mixResult{background:#0e1a15;color:#eef7f1;border-radius:16px;padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;line-height:1.45;white-space:pre-wrap}.warnBox{background:#fff4df;border:1px solid #f0d6a8;border-radius:14px;padding:10px;font-size:13px;line-height:1.35;color:#54340a}.doseBadge{display:inline-block;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:1000;background:var(--blue2);color:var(--blue);margin:2px}.contextMuted{opacity:.62}.bigAction{font-size:15px;padding:12px 16px}.field small{display:block;color:var(--muted);font-weight:700;margin-top:4px}@media (min-width:800px){.app{padding:18px 18px 96px}.cards{grid-template-columns:repeat(2,minmax(0,1fr))}.infoGrid{grid-template-columns:repeat(4,minmax(0,1fr))}.formGrid{grid-template-columns:repeat(3,minmax(0,1fr))}.modalBackdrop{align-items:center}.modal{border-radius:24px;max-width:760px;margin:auto}.stats{grid-template-columns:repeat(6,minmax(0,1fr))}}@media (max-width:540px){.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.chartMeta{grid-template-columns:repeat(2,1fr)}.formGrid{grid-template-columns:1fr}.title{font-size:19px}.topActions .ghostBtn{display:none}.farmCard{padding:11px}.panel{padding:12px}.searchRow{top:102px}.navItem{font-size:10px}}

<script>

});
const SEED = JSON.parse(document.getElementById('seed-data').textContent);
const STORE_KEY = 'vpgcFieldTracker.v1.2'; // keep same key so v1.3 reads your existing v1.2 phone data
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
let storageOK = true;
let state = loadState();
let view = 'today';
let detailId = null;
let detailTab = 'chart';
let filters = {flock:'all', product:'all', mixFlock:'', mixProduct:'BioSupreme'};
let query = '';
const views = [
  ['today','Today','▣'],['flocks','Flocks','▤'],['mix','Mix','≈'],['products','Products','◈'],['meeting','Meeting','☰'],['backup','Backup','⇅']
];

  {id:'Celmanax', name:'Celmanax', confirmed:false, doseType:'unknown', note:'Dose not locked in app yet; use label/SOP.'}
];
function clone(x){ return JSON.parse(JSON.stringify(x)); }
function loadState(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(raw){
      const s=normalizeState(JSON.parse(raw));
      if(s && s.flocks){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(s)); }catch(e){} return s; }
    }
  }catch(e){ storageOK=false; console.warn('Local storage unavailable; using temporary in-memory mode.', e); }
  const fresh=normalizeState(clone(SEED)); fresh.userCreatedAt = new Date().toISOString();
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(fresh)); }catch(e){ storageOK=false; console.warn('Could not save preload locally.', e); }
  return fresh;
}
function save(){ try{ state=normalizeState(state); localStorage.setItem(STORE_KEY, JSON.stringify(state)); storageOK=true; }catch(e){ storageOK=false; console.warn('Save failed; use Download Backup if possible.', e); toast('Not saved locally — export backup'); } }
function resetSeed(){ if(confirm('Reset local app data back to the built-in shell/default? This overwrites local changes. Export a backup first if needed.')){ state=clone(SEED); save(); detailId=null; view='today'; render(); toast('Reset local data'); }}
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1700); }
function esc(s){ return String(s ?? '').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function oneLine(s,n=95){ s=String(s||'').replace(/\s+/g,' ').trim(); return s.length>n?s.slice(0,n-1)+'…':s; }
function parseMortalityNumber(raw){
  const s=String(raw ?? '').trim();
  if(!s || s==='?') return null;
  const low=s.toLowerCase();
  if(/hard to read|unreadable|looked|lower than|\?;/.test(low)) return null;
  let m=low.match(/(?:about|approx(?:\.|imately)?|~)\s*(\d+)/) || low.match(/^(\d+)\s+likely\b/) || low.match(/^(\d+)\s+for\b/) || low.match(/^(\d+)\s*(?:$|\s+read\b|\s+so far\b)/);
  if(m) return parseInt(m[1],10);
  if(/^\d+$/.test(s)) return parseInt(s,10);
  return null;
}
function isEntryUncertain(e){ return !!(e && (e.uncertain || /\?|hard to read|unreadable|likely|about|approx|current|partial|so far/i.test(String(e.raw||'')))); }
function isEntrySoFar(e){ return !!(e && (e.soFar || /current|partial|so far/i.test(String(e.raw||'')))); }
function normalizeMortalityEntry(e){
  if(!e) return e;
  e.raw = e.raw ?? (e.mortality!=null ? String(e.mortality) : '?');
  e.uncertain = isEntryUncertain(e);
  e.soFar = isEntrySoFar(e);
  e.needsVerify = !!(e.uncertain || e.soFar);
  const n=parseMortalityNumber(e.raw);
  if(n==null){ delete e.mortality; }
  else { e.mortality=n; }
  e.aminoReady = !!(e.mortality!=null && !e.uncertain && !e.soFar && !e.aminoEntered && !/total/i.test(String(e.label||'')));
  e.rowStatus = e.aminoEntered ? 'entered' : (e.aminoReady ? 'ready' : (e.uncertain ? 'verify' : (e.soFar ? 'sofar' : 'hold')));
  return e;
}
function normalizeState(s){
  if(!s || !s.flocks) return s;
  s.version = s.version || 'unknown';
  s.appShellVersion = 'v1.5';
  s.flocks.forEach(f=>{
    f.flags = Array.isArray(f.flags)?f.flags:[];
    f.customNotes = Array.isArray(f.customNotes)?f.customNotes:[];
    f.mortalityEntries = Array.isArray(f.mortalityEntries)?f.mortalityEntries.map(normalizeMortalityEntry).filter(e=>{ const noDays=!e.days||!Object.values(e.days).some(Boolean); return !(noDays && String(e.raw||'').trim()==='?' && /week __|current week so far/i.test(String(e.label||''))); }):[];
    if((f.uncertainties && /\?|uncertain|mismatch|verify|hard to read/i.test(f.uncertainties)) && !f.flags.includes('uncertain')) f.flags.push('uncertain');
  });
  s.products = Array.isArray(s.products)?s.products:[];
  s.amino = Array.isArray(s.amino)?s.amino:[];
  s.coverage = Array.isArray(s.coverage)?s.coverage:[];
  s.closed = Array.isArray(s.closed)?s.closed:[];
  return s;
}
function runDataCleanup(){ state=normalizeState(state); save(); render(); toast('Data cleanup applied'); }
function displayMortality(e){ return e.mortality!=null ? e.mortality : (e.raw || '?'); }
function aminoReadyRows(f){
  return (f.mortalityEntries||[]).filter(e=>normalizeMortalityEntry(e).aminoReady).map(e=>`${f.farm} | ${f.tank} | ${e.label} | ${e.mortality} | ${f.estimatedCurrentCount||'?'}`);
}
function heldMortalityRows(f){
  return (f.mortalityEntries||[]).filter(e=>{e=normalizeMortalityEntry(e); return !e.aminoReady && !e.aminoEntered && !/total/i.test(String(e.label||''));}).map(e=>`${f.farm} ${f.tank} — ${e.label}: ${displayMortality(e)}${e.soFar?' so far':''}${e.uncertain?' ?':''}`);
}
function activeFlocks(){ return state.flocks.filter(f=>!f.archived); }
function hasText(f,terms){ const t=Object.values(f).join(' ').toLowerCase(); return terms.some(x=>t.includes(x)); }
function bucketFor(f){
  const t=Object.values(f).join(' ').toLowerCase();
  if(/blackhead|bh risk|gut risk|enteritis|e\. coli/.test(t)) return 'late';
  if(/product pending|rx cleanup|sign-out pending|delivered\/on farm|planned|on truck/.test(t)) return 'hold';
  if(/issue|mortality jump|serious|on meds|processing next week|fresh chart needed|not chart-seen/.test(t)) return 'must';
  return 'nice';
}
function statusBadge(f){
  const s=(f.statusMain||f.status||'active').toLowerCase();
  let cls=s.includes('issue')?'issue':s.includes('watch')?'watch':s.includes('uncertain')?'uncertain':'active';
  return `<span class="badge ${cls}">${esc(s)}</span>`;

function flagBadges(f){
  const map={'on meds':'product','rx cleanup':'rx','product pending':'product','bh/gut risk':'gut','heat watch':'heat','uncertain':'uncertain'};
  return (f.flags||[]).slice(0,4).map(x=>`<span class="badge ${map[x]||'watch'}">${esc(x)}</span>`).join('');
}
function render(){ try{ renderShell(); if(detailId) return renderDetail(); const fn={today:renderToday, flocks:renderFlocks, mix:renderMix, products:renderProducts, meeting:renderMeeting, backup:renderBackup}[view] || renderToday; fn(); }catch(e){ console.error(e); document.getElementById('main').innerHTML='<div class="panel"><div class="panelTitle">Render error</div><p class="noteLine">'+esc(e.message||e)+'</p><p class="noteLine">Send this screenshot back to ChatGPT and I will patch it.</p></div>'; } }

function flockCard(f){
  return `<div class="farmCard clickable" onclick="openFlock('${f.id}')">
    <div class="cardTop"><div><div class="farmName">${esc(f.farm)} <span class="tank">${esc(f.tank)}</span></div><div class="meta">Flock ${esc(f.flockNo)} • ${esc(f.age)} • chart ${esc(f.lastChartDate)}</div></div><div>${statusBadge(f)}</div></div>

function getFlockHeadcount(f){
  if(!f) return {value:null, source:'No flock selected', uncertain:true};

}

  const txt=(p.name+' '+(f?.activeIssue||'')+' '+(f?.currentMeds||'')).toLowerCase();
  if(/dimethox|albon/.test(txt) && ageW!=null && ageW>=11) warnings.push('Dimethox age warning: do not use after 11w unless office/vet directs.');
  if(/oxy|tetroxy/.test(txt) && /ort/.test(String(f?.activeIssue||'').toLowerCase())) warnings.push('ORT reminder: ORT responds to Pen/R-Pen direction, not Oxytet/Oxy. Verify product choice.');
  if(ageW!=null && ageW>=13 && /heat|electrolyte|older/.test(String(f?.status+' '+f?.activeIssue).toLowerCase())) warnings.push('Heat watch: 13w+ birds may need Electrolytes + C / fan checks per current heat guidance.');
  if(/pen|oxy|tetroxy|dimethox|albon/.test(p.id.toLowerCase())) warnings.push('Rx/sign-out reminder: drug room→truck no Rx; truck→farm requires Rx/sign-out.');
  let lines=[];
  lines.push(`Farm: ${f?f.farm+' '+f.tank:'?'}`);
  lines.push(`Product: ${p.name}`);
  lines.push(`Headcount used: ${head||'?'} (${getFlockHeadcount(f).source})`);
  lines.push(`Age/week: ${f?.age||'?'} | Medicator: 1:${ratio||'?'} | Bucket: ${bucket||'?'} gal`);
  if(head>0 && gal1000>0 && ratio>0 && bucket>0){
    const drink=head/1000*gal1000;
    const stock=drink/ratio;
    const buckets=stock/bucket;
    const remainingDays=Math.max(days-ran,0);
    const stockRemain=stock*remainingDays;
    lines.push('');
    lines.push(`Daily drinking water estimate: ${drink.toFixed(1)} gal/day`);
    lines.push(`Daily stock solution: ${stock.toFixed(2)} gal/day`);
    lines.push(`5-gal buckets/day: ${buckets.toFixed(2)}`);
    lines.push(`Remaining stock needed (${remainingDays} days): ${stockRemain.toFixed(2)} gal`);
    if(p.confirmed && p.doseType==='oz_per_stock_gal') lines.push(`Product needed: ${(stockRemain*p.dose).toFixed(1)} ${p.unit} (${p.dose} ${p.unit}/gal stock)`);
    else if(p.confirmed && p.doseType==='pack_per_stock_gal') lines.push(`Product needed: ${(stockRemain*p.dose).toFixed(1)} ${p.unit} (${p.note})`);
    else lines.push(`Product amount: DOSE NOT CONFIRMED — ${p.note}`);
  } else lines.push('Enter headcount + Gal/1,000 + ratio + bucket to calculate stock use.');
  if(warnings.length){ lines.push(''); lines.push('WARNINGS / VERIFY:'); warnings.forEach(w=>lines.push('• '+w)); }
  lines.push(''); lines.push('Dose note: '+p.note);
  document.getElementById('mixOut').textContent=lines.join('\n');
}

function copyText(txt){ navigator.clipboard?.writeText(txt).then(()=>toast('Copied')).catch(()=>{prompt('Copy this:',txt);}); }
function copyCoverage(){ copyText(state.coverage.map(c=>`${c.farm} | chart ${c.seenChart} | drop ${c.productDrop} | not seen ${c.notSeen} | ${c.notes}`).join('\n')); }
function downloadBackup(){ const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='vpgc-field-tracker-backup-'+new Date().toISOString().slice(0,10)+'.json'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); toast('Backup downloaded'); }
function importBackup(){ try{ const s=JSON.parse(val('importJson')); if(!s.flocks) throw new Error('No flocks array'); if(confirm('Import this backup and replace current local app data?')){ state=normalizeState(s); save(); detailId=null; view='today'; closeModal(); render(); toast('Backup imported'); }}catch(e){ alert('Could not import JSON: '+e.message); }}
function importBackupFile(file){ if(!file) return; const reader=new FileReader(); reader.onload=function(){ try{ const s=JSON.parse(reader.result); if(!s.flocks) throw new Error('No flocks array'); if(confirm('Import this JSON file and replace current local app data?')){ state=normalizeState(s); save(); detailId=null; view='today'; render(); toast('JSON file imported'); } }catch(e){ alert('Could not import JSON file: '+e.message); } }; reader.readAsText(file); }
window.addEventListener('click',e=>{ if(e.target.id==='modalBackdrop') closeModal(); });
render();
</script>
