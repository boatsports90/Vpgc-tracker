function escapeRegExp(s){ return String(s||'').replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function baseFarmName(name){
  const original=String(name||'Unknown farm').replace(/\s+/g,' ').trim() || 'Unknown farm';
  let n=original;
  n=n.replace(/\s*[#№]\s*\d+\s*$/i,'');
  n=n.replace(/\s+(?:No\.?|Number)\s*\d+\s*$/i,'');
  // group common service splits like Cobblestone 1 / Cobblestone 2, but avoid names where the number is part of the core name with no space.
  n=n.replace(/\s+\d+\s*$/,'');
  return n.trim() || original;
}
function farmExactName(f){ return String(f.farm||'Unknown farm').replace(/\s+/g,' ').trim() || 'Unknown farm'; }

  const rest=exact.replace(re,'').trim();

}

  const add=n=>{ if(n && isFinite(n) && n>0 && n<60) nums.push(n); };

  add(parseWeekNumberFromText(f&&f.currentWeek));
  if(f && f.currentWeek && /^\d+$/.test(String(f.currentWeek))) add(parseInt(f.currentWeek,10));
  const ageText=String(f&&f.age||'');
  const chartM=ageText.match(/chart\s*shows\s*week\s*(\d{1,2})/i); if(chartM) add(parseInt(chartM[1],10));
  const ageM=ageText.match(/(\d{1,2})\s*w/i); if(ageM) add(parseInt(ageM[1],10)+1);
  (f&&f.mortalityEntries||[]).forEach(e=>add(explicitEntryWeek(e)));
  return nums.length?Math.max(...nums):null;
}
function weekNumberForEntry(f,e,i){
  let n=explicitEntryWeek(e); if(n) return n;
  const txt=String((e&&e.label)||'')+' '+String((e&&e.raw)||'');
  if(/current|so\s*far|partial/i.test(txt)){
    const explicit=(f&&f.mortalityEntries||[]).map(explicitEntryWeek).filter(Boolean);
    const cur=currentWeekNumberForFlock(f);
    return cur || (explicit.length?Math.max(...explicit)+1:null);
  }
  return null;
}
function weekDateSpanForFlock(f,week){
  const info=flockStartInfo(f); if(!info.date || !week) return '';
  const start=addDays(info.date,(week-1)*7); const end=addDays(start,6);
  return fmtMDYY(start)+'–'+fmtMDYY(end);
}
function entryDisplayLabel(f,e,week){
  const label=String((e&&e.label)||'').trim();
  if(label && !/^week\s*\?$/i.test(label)){
    if(/current|so\s*far|partial/i.test(label) && week && !/week\s*\d+/i.test(label)) return 'Week '+week+' — '+label;
    return label;
  }
  return week?'Week '+week:'Week ?';
}
function buildWholeChartRows(f){
  const entries=(f.mortalityEntries||[]).map((e,i)=>({e:normalizeMortalityEntry(e),i}));
  const max=currentWeekNumberForFlock(f) || (entries.length?Math.max(...entries.map(x=>weekNumberForEntry(f,x.e,x.i)||0)):0);
  const used=new Set(); const rows=[];
  for(let w=1; w<=max; w++){
    const matches=entries.filter(x=>!used.has(x.i) && weekNumberForEntry(f,x.e,x.i)===w);
    if(matches.length){ matches.forEach(x=>{ used.add(x.i); rows.push({week:w,e:x.e,i:x.i,synthetic:false,dateSpan:rowDateText(f,x.e,x.i)||weekDateSpanForFlock(f,w)}); }); }
    else rows.push({week:w,i:-1,synthetic:true,dateSpan:weekDateSpanForFlock(f,w),e:{label:'Week '+w,days:{},raw:'',mortality:null,aminoReady:false,aminoEntered:false,uncertain:false,soFar:false}});
  }
  entries.forEach(x=>{ if(!used.has(x.i)) rows.push({week:weekNumberForEntry(f,x.e,x.i),e:x.e,i:x.i,synthetic:false,dateSpan:rowDateText(f,x.e,x.i)}); });
  return rows;
}
function productById(id){ return MIX_PRODUCTS.find(p=>p.id===id) || MIX_PRODUCTS[0]; }
function mixFarmOptionValue(family){ return 'farm::'+encodeURIComponent(family); }
function mixSelectionFlocks(sel){
  const fl=activeFlocks();
  if(!sel && fl[0]) return [fl[0]];
  if(String(sel).startsWith('farm::')){ const fam=decodeURIComponent(String(sel).slice(6)); return fl.filter(f=>farmKey(f)===fam); }
  const f=fl.find(x=>x.id===sel); return f?[f]:(fl[0]?[fl[0]]:[]);
}
function selectedMixLabel(selection){
  const arr=mixSelectionFlocks(selection); if(!arr.length) return '?';
  if(String(selection).startsWith('farm::')) return `${farmKey(arr[0])} — whole farm (${arr.length} houses)`;
  return `${arr[0].farm} ${arr[0].tank}`;
}
function getMixHeadcount(arr){
  arr=arr||[]; if(!arr.length) return {value:null, source:'No flock selected', uncertain:true};
  const parts=arr.map(getFlockHeadcount); const known=parts.filter(p=>p.value!=null);
  const total=known.reduce((s,p)=>s+p.value,0); const uncertain=known.length!==arr.length || parts.some(p=>p.uncertain);
  const source=arr.length===1 ? parts[0].source : `${known.length}/${arr.length} houses with count${uncertain?' — verify before sign-out':''}`;
  return {value: total||null, source, uncertain};
}
function mixAgeWeeks(arr){
  const ages=(arr||[]).map(parseAgeWeeks).filter(x=>x!=null); if(!ages.length) return {week:null, note:'Age/week missing — enter water manually.'};
  const min=Math.min(...ages), max=Math.max(...ages); if(max-min>=2) return {week:null, note:`Age split ${min}w–${max}w — enter water manually or calculate houses separately.`};
  return {week:max, note: ages.length>1?`Using oldest selected age ${max}w for whole-farm estimate.`:`Using ${max}w age.`};
}
function waterEstimateForSelection(arr){
  const a=mixAgeWeeks(arr);
  const settingsTable=(state.settings&&state.settings.waterGal1000ByWeek)||{};
  let row=null;
  if(a.week!=null){
    const s=settingsTable[String(a.week)];
    if(s){
      if(typeof s==='object') row=s;
      else row={min:Number(s),max:Number(s)};
    } else row=WATER_CONSUMPTION_TABLE[a.week];
  }
  if(a.week!=null && row){
    const min=Number(row.min ?? row.value ?? row.max);
    const max=Number(row.max ?? row.value ?? row.min);
    const use=max || min;
    return {value:use, note:`Locked water chart week ${a.week}: ${min}–${max} gal/1,000/day. Using high end ${use} for product planning. ${a.note} Hot weather may run higher.`};
  }
  return {value:'', note:`Age/week missing or outside water chart. ${a.note} Enter gal/1,000 manually.`};
}

function weekEntriesFromUpdate(u){
  const out=[]; const mw=u.mortalityByWeek||{};
  Object.keys(mw).forEach(k=>{
    const raw=mw[k];
    const lower=String(k).toLowerCase();
    const label=lower.includes('week')?k:'Week '+k.replace(/_/g,' ');
    const uncertain=/so_far|partial|approx|old|verify|estimated/i.test(k+' '+raw);
    const soFar=/so_far|partial|current/i.test(k+' '+raw);
    out.push(normalizeMortalityEntry({label, raw:String(raw), mortality:typeof raw==='number'?raw:parseMortalityNumber(String(raw)), source:'current update import', soFar, uncertain}));
  });
  if(u.currentWeekMortalitySoFar && typeof u.currentWeekMortalitySoFar==='number') out.push(normalizeMortalityEntry({label:'Current week so far', raw:String(u.currentWeekMortalitySoFar), mortality:u.currentWeekMortalitySoFar, source:'current update import', soFar:true, uncertain:false}));
  if(u.dailyMortalityKnown){
    Object.keys(u.dailyMortalityKnown).forEach(k=>{
      const daysObj=u.dailyMortalityKnown[k];
      if(daysObj && typeof daysObj==='object'){
        const days={}; let sum=0; Object.keys(daysObj).forEach(d=>{ days[d.slice(0,3)]=String(daysObj[d]); const n=parseMortalityNumber(String(daysObj[d])); if(n!=null) sum+=n; });
        out.push(normalizeMortalityEntry({label:k.replace(/_/g,' '), days, raw:String(sum), mortality:sum, source:'current daily update import', soFar:/so_far|partial|approx|old/i.test(k), uncertain:/approx|verify|old/i.test(k)}));
      }
    });
  }
  return out;
}
function productTextFromUpdate(arr){ if(!Array.isArray(arr)||!arr.length) return '?'; return arr.map(p=>`${p.product||'?'} — ${p.status||'?'}${p.date?' '+p.date:''}${p.cleanupNote?' ('+p.cleanupNote+')':''}`).join('\n'); }
function mergeCurrentUpdate(update){
  if(!update || !Array.isArray(update.activeFlocks)) throw new Error('Expected activeFlocks array.');
  let updated=0, added=0, closed=0;
  update.activeFlocks.forEach(u=>{

    const preservedNotes=f && Array.isArray(f.customNotes) ? f.customNotes : [];
    const base={
      id:f?f.id:'import-'+Date.now()+'-'+Math.random().toString(36).slice(2,7), index:f?f.index:state.flocks.length+1,
      farm:u.farm||'?', tank:u.houseTank||u.tank||'?', flockNo:u.flockNumber||'?', status:u.status||'active', statusMain:/issue|rough|bh|gut/i.test(u.status+' '+u.healthNotes)?'issue':/watch|heat/i.test(u.status+' '+u.healthNotes)?'watch':'active',
      flags:[], originalStart:u.originalStartBirthday||'?', moveDate:u.moveDate||'?', age:u['currentAgeAsOf2026-06-29']||u.currentAge||'?',
      startHeadcount:u.startingHeadcount!=null?String(u.startingHeadcount):'?', estimatedCurrentCount:u.currentHeadcount!=null?String(u.currentHeadcount):'?', sourceBroodFarm:u.sourceBroodFarm||u.source||'?',
      lastChartDate:u.lastChartDate||'?', chartWeekShown:u.currentWeek!=null?'Week '+u.currentWeek:'?', aminoEnteredThrough:u.aminoEnteredThrough||'verify_current', nextAminoNeeded:u.nextAminoNeeded||'verify before entry',
      currentMeds:productTextFromUpdate(u.currentMedsProducts), treatmentStart:u.treatmentStart||'?', activeIssue:u.healthNotes||u.activeIssue||'?',
      mortalitySummary:u.mortalityByWeek?Object.entries(u.mortalityByWeek).map(([k,v])=>`Week ${k}: ${v}`).join('\n'):'?',
      productCleanup:productTextFromUpdate(u.currentMedsProducts), routeNotes:u.healthNotes||'', meetingNote:u.healthNotes||'', uncertainties:(u.uncertaintyFlags||[]).join('\n'),
      chartDayStart:'Mon', archived:false, close:null, customNotes:preservedNotes, contextOverrides:(f&&f.contextOverrides)||{}, hiddenContextNotes:(f&&f.hiddenContextNotes)||[]
    };
    base.flags=[]; const txt=(base.status+' '+base.activeIssue+' '+base.currentMeds+' '+base.uncertainties).toLowerCase();
    if(txt.includes('heat')) base.flags.push('heat watch'); if(txt.includes('bh')||txt.includes('blackhead')||txt.includes('gut')) base.flags.push('bh/gut risk'); if(txt.includes('rx')) base.flags.push('rx cleanup'); if(txt.includes('product')||txt.includes('delivered')||txt.includes('needed')) base.flags.push('product pending'); if(txt.includes('uncertain')||txt.includes('verify')||txt.includes('?')) base.flags.push('uncertain');
    const newEntries=weekEntriesFromUpdate(u); base.mortalityEntries=newEntries.length?newEntries:(f&&f.mortalityEntries?f.mortalityEntries:[]);
    if(f){ Object.assign(f,base); updated++; } else { state.flocks.push(base); added++; }
  });
  (update.closedOrNoBirdFlocks||[]).forEach(c=>{
    const farmK=normKey(c.farm);
    state.flocks.filter(f=>normKey(f.farm).includes(farmK)||farmK.includes(normKey(f.farm))).forEach(f=>{ if(!f.archived){ f.archived=true; f.close={date:update.meta?.asOfDate||new Date().toLocaleDateString(), reason:c.status||'closed/no birds', note:c.actionNeeded||''}; closed++; }});
    state.closed=state.closed||[]; state.closed.unshift({id:'closed-import-'+Date.now()+Math.random(), farm:c.farm, tank:'?', closeDate:update.meta?.asOfDate||'?', reason:c.status||'closed/no birds', notes:c.actionNeeded||''});
  });
  if(Array.isArray(update.productRxSignoutCleanup)){
    update.productRxSignoutCleanup.forEach(p=>state.products.unshift({id:'product-import-'+Date.now()+Math.random(), date:p.date||'?', farm:p.farm||'?', product:p.product||'?', amount:p.quantity||p.amount||'?', status:p.status||'?', rxStatus:p.rxStatus||'?', cleanupNote:p.cleanupNote||''}));

  state=normalizeState(state); save(); render(); return {updated,added,closed};

  const conflict=activeFlocks().find(f=>f.farm.toLowerCase()===farm.toLowerCase() && f.tank.toLowerCase()===tank.toLowerCase());
  if(conflict && !confirm('Active flock already exists for this farm/tank. Add anyway as correction/new flock?')) return;
  const f={id:'user-'+Date.now(),index:state.flocks.length+1,farm,tank,flockNo:val('flockNo')||'?',status:val('status')||'active',statusMain:'active',flags:[],originalStart:val('originalStart')||'?',moveDate:val('moveDate')||'?',age:val('age')||'?',startHeadcount:val('startHeadcount')||'?',estimatedCurrentCount:'?',sourceBroodFarm:'?',lastChartDate:val('lastChartDate')||'?',chartWeekShown:'?',aminoEnteredThrough:'?',nextAminoNeeded:'?',currentMeds:'?',treatmentStart:'?',activeIssue:val('activeIssue')||'?',mortalitySummary:'',mortalityEntries:[],productCleanup:'?',routeNotes:'?',meetingNote:'?',uncertainties:val('uncertainties')||'?',chartDayStart:'Mon',archived:false,close:null,customNotes:[]};
  state.flocks.push(f); save(); closeModal(); openFlock(f.id); toast('Flock added');
}
function saveEditFlock(id){ const f=state.flocks.find(x=>x.id===id); if(!f) return; ['farm','tank','flockNo','originalStart','moveDate','startHeadcount','age','status','lastChartDate','aminoEnteredThrough','nextAminoNeeded','activeIssue','currentMeds','uncertainties'].forEach(k=>f[k]=val(k)||'?'); f.statusMain=f.status.toLowerCase().includes('issue')?'issue':f.status.toLowerCase().includes('watch')?'watch':'active'; save(); closeModal(); renderDetail(); toast('Flock updated'); }
function saveMortality(id){ const f=state.flocks.find(x=>x.id===id); if(!f) return; const days={}; let sum=0; DAYS.forEach(d=>{const x=val('day_'+d); if(x){days[d]=x; const n=parseMortalityNumber(x); if(n!=null) sum+=n;}}); const rawTotal=val('weeklyTotal'); const manual=parseMortalityNumber(rawTotal); const total=manual!=null?manual:(sum||null); const e=normalizeMortalityEntry({label:val('weekLabel')||'Week ?',dateSpan:val('dateSpan'),days,raw: rawTotal || (total==null?'?':String(total)),mortality:total,source:val('source')||'manual entry',soFar:document.getElementById('soFar').checked,uncertain:document.getElementById('uncertain').checked || /\?|about|approx|likely/i.test(rawTotal),note:val('note')}); f.mortalityEntries=f.mortalityEntries||[]; f.mortalityEntries.push(e); f.lastChartDate=e.dateSpan || f.lastChartDate; save(); closeModal(); renderDetail(); toast(e.aminoReady?'Mortality added':'Mortality added — held for verify'); }
function parseDaysIntoObject(text){ const days={}; String(text||'').split(/[,|;]/).forEach(part=>{ const m=part.trim().match(/^(Mon|Tue|Wed|Thu|Fri|Sat|Sun|Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday)\b\s*=?\s*(.+)$/i); if(m){ const key=m[1].slice(0,3); days[key.charAt(0).toUpperCase()+key.slice(1).toLowerCase()]=m[2].trim(); } }); return days; }
function makeEntryFromChartLine(line, span, globalNote){
  let txt=String(line||'').trim(); if(!/^week\s*/i.test(txt)) return null;
  const parts=txt.split('|').map(x=>x.trim()).filter(Boolean);
  let first=parts.shift()||txt;
  let m=first.match(/^Week\s*([^:|]+)\s*:?\s*(.*)$/i); if(!m) return null;
  const label='Week '+m[1].trim(); let rest=m[2]||'';
  const days=parseDaysIntoObject(parts.join('|')+'|'+rest);
  let totalRaw=''; let note=''; let aminoEntered=false;
  const all=(parts.join('|')+'|'+rest);
  const totalMatch=all.match(/\b(?:total|mortality)\s*=\s*([^|,;]+)/i) || all.match(/\btotal\s*:\s*([^|,;]+)/i);
  if(totalMatch) totalRaw=totalMatch[1].trim();
  else if(rest && Object.keys(days).length===0) totalRaw=rest.trim();
  const noteMatch=all.match(/\bnotes?\s*=\s*([^|]+)/i); if(noteMatch) note=noteMatch[1].trim();
  aminoEntered=/\bamino\s*=\s*(entered|yes|done)|\bentered\s*=\s*(yes|true)|\bentered\s+amino\b/i.test(all);
  let total=parseMortalityNumber(totalRaw);
  if(total==null){ let sum=0, any=false; Object.values(days).forEach(v=>{const n=parseMortalityNumber(v); if(n!=null){sum+=n; any=true;}}); if(any){total=sum; totalRaw=String(sum);} }
  const soFar=/so far|partial|current/i.test(all);
  const uncertain=/\?|uncertain|hard to read|likely|about|approx|verify/i.test(all);
  return normalizeMortalityEntry({label,dateSpan:span,days,raw:totalRaw||'?',mortality:total,source:'ChatGPT multi-week chart import',soFar,uncertain,note:note||globalNote||'',aminoEntered});
}
function importChartBlock(id){
  const f=state.flocks.find(x=>x.id===id); const block=val('chartBlock'); if(!f||!block) return;
  const find=(key)=>{const m=block.match(new RegExp('^'+key+'\\s*:\\s*(.+)$','mi'));return m?m[1].trim():''};
  const span=find('DATE_SPAN')||''; const globalNote=find('NOTES')||'';
  const multi=[];
  block.split(/\n/).forEach(line=>{ const e=makeEntryFromChartLine(line, span, globalNote); if(e) multi.push(e); });
  if(multi.length){
    f.mortalityEntries=f.mortalityEntries||[]; multi.forEach(e=>f.mortalityEntries.push(e)); if(span) f.lastChartDate=span; save(); closeModal(); renderDetail(); toast(`Imported ${multi.length} chart rows`); return;
  }
  const week=find('CHART_WEEK')||find('WEEK')||'?'; const daysRaw=find('DAYS')||''; const totalRaw=find('TOTAL_SO_FAR')||find('TOTAL')||'';
  const days=parseDaysIntoObject(daysRaw); let total=parseMortalityNumber(totalRaw);
  if(total==null){ let sum=0, any=false; Object.values(days).forEach(v=>{const n=parseMortalityNumber(v); if(n!=null){sum+=n; any=true;}}); total=any?sum:null; }
  const raw=totalRaw || (total==null?'?':String(total));
  const e=normalizeMortalityEntry({label:String(week).toLowerCase().includes('week')?week:'Week '+week,dateSpan:span,days,raw,mortality:total,source:'ChatGPT chart import',soFar:/so far|current|partial/i.test(block),uncertain:/\?|uncertain|hard to read|likely|about|approx/i.test(block),note:globalNote});
  f.mortalityEntries=f.mortalityEntries||[]; f.mortalityEntries.push(e); if(span) f.lastChartDate=span; save(); closeModal(); renderDetail(); toast(e.aminoReady?'Chart import added':'Chart import added — held for verify');
}
function saveNote(id){ const f=state.flocks.find(x=>x.id===id); if(!f) return; f.customNotes=f.customNotes||[]; f.customNotes.push({date:val('noteDate')||new Date().toLocaleDateString(),text:val('noteText')}); save(); closeModal(); detailTab='notes'; renderDetail(); toast('Note saved'); }
function saveQuickNote(){ const id=val('quickFlock'), text=val('quickNote'); if(!text) return alert('Add a note first.'); if(id){ const f=state.flocks.find(x=>x.id===id); f.customNotes=f.customNotes||[]; f.customNotes.push({date:new Date().toLocaleString(),text}); detailId=id; detailTab='notes'; } else { state.generalNotes=state.generalNotes||[]; state.generalNotes.push({date:new Date().toLocaleString(),text}); } save(); closeModal(); render(); toast('Quick note saved'); }
function saveProduct(){ const p={id:'product-'+Date.now(),date:val('pDate')||'?',farm:val('pFarm')||'?',product:val('pProduct')||'?',amount:val('pAmount')||'?',status:val('pStatus')||'?',rxStatus:val('pRx')||'?',cleanupNote:val('pCleanup')||'?'}; state.products.unshift(p); save(); closeModal(); view='products'; detailId=null; render(); toast('Product saved'); }
function closeFlock(id){ const f=state.flocks.find(x=>x.id===id); if(!f) return; f.archived=true; f.close={date:val('closeDate')||'?',reason:val('closeReason')||'?',finalMortality:val('finalMort')||'?',finalCount:val('finalCount')||'?',aminoThrough:val('finalAmino')||'?',note:val('finalNote')||''}; state.closed.unshift({id:'closed-'+Date.now(),farm:f.farm,tank:f.tank,closeDate:f.close.date,reason:f.close.reason,notes:f.close.note}); save(); closeModal(); detailId=null; view='flocks'; render(); toast('Flock archived'); }


function todayISO(){ const d=new Date(); const local=new Date(d.getTime()-d.getTimezoneOffset()*60000); return local.toISOString().slice(0,10); }
function safeFilePart(s){ return String(s||'unknown').trim().replace(/[#/\\?%*:|"<>]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-') || 'unknown'; }
function makePhotoFilename(f,type,date){ return `${date||todayISO()}_${safeFilePart(f.farm)}_${safeFilePart(f.tank)}_${safeFilePart(type||'photo')}.jpg`; }
function photosForFlock(f){ return Object.values(photos||{}).filter(p=>p.flockId===f.id).sort((a,b)=>String(b.createdAt).localeCompare(String(a.createdAt))); }
function savePhotoFileToFlock(f,file,type,date,note,after){
  if(!f) return alert('Flock not found.'); if(!file) return alert('Choose/take a photo first.');
  const filename=makePhotoFilename(f,type,date); const reader=new FileReader();
  reader.onload=function(){
    const img=new Image();
    img.onload=function(){
      try{
        const max=1600; let w=img.width, h=img.height; const scale=Math.min(1,max/Math.max(w,h)); w=Math.round(w*scale); h=Math.round(h*scale);
        const canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h; const ctx=canvas.getContext('2d'); ctx.drawImage(img,0,0,w,h);
        const dataUrl=canvas.toDataURL('image/jpeg',0.78); const pid='photo-'+Date.now();
        photos[pid]={id:pid,flockId:f.id,farm:f.farm,tank:f.tank,type,date,note,filename,mime:'image/jpeg',dataUrl,createdAt:new Date().toISOString()};
        savePhotos(); if(type==='chart') f.lastChartDate=date||f.lastChartDate; save(); if(after) after(pid); toast('Photo saved');
      }catch(e){ alert('Photo could not be processed: '+e.message); }
    };
    img.onerror=function(){ alert('Could not read that image.'); };
    img.src=reader.result;
  };
  reader.readAsDataURL(file);
}
function saveInboxPhoto(){
  const f=state.flocks.find(x=>x.id===val('inboxFlock')); const input=document.getElementById('inboxPhotoFile'); const file=input&&input.files&&input.files[0];
  const type=val('inboxPhotoType')||'chart', date=val('inboxPhotoDate')||todayISO(), note=val('inboxPhotoNote')||'';
  savePhotoFileToFlock(f,file,type,date,note,function(){ closeModal(); view='backup'; detailId=null; renderBackup(); });
}
function saveGpsInfo(){
  const farm=val('gpsFarm'), value=val('gpsValue'), conf=val('gpsConf'), note=val('gpsNote'); if(!farm) return alert('Pick a farm.');
  activeFlocks().filter(f=>f.farm===farm).forEach(f=>{ f.gps=value; f.gpsConfidence=conf; f.gpsNote=note; });
  save(); closeModal(); view='gps'; detailId=null; renderGps(); toast('GPS saved for '+farm);
}
function savePhoto(id){
  const f=state.flocks.find(x=>x.id===id); const input=document.getElementById('photoFile'); const file=input&&input.files&&input.files[0];
  const type=val('photoType')||'chart', date=val('photoDate')||todayISO(), note=val('photoNote')||'';
  savePhotoFileToFlock(f,file,type,date,note,function(){ closeModal(); detailTab='photos'; renderDetail(); });
}
async function dataUrlToFile(dataUrl,filename,mime){ const res=await fetch(dataUrl); const blob=await res.blob(); return new File([blob], filename, {type:mime||blob.type||'image/jpeg'}); }
async function sharePhoto(pid){
  const p=photos[pid]; if(!p) return;
  try{
    const file=await dataUrlToFile(p.dataUrl,p.filename,p.mime);
    if(navigator.canShare && navigator.canShare({files:[file]})) await navigator.share({files:[file],title:p.filename,text:p.filename});
    else downloadPhoto(pid);
  }catch(e){ downloadPhoto(pid); }
}
function downloadPhoto(pid){ const p=photos[pid]; if(!p) return; const a=document.createElement('a'); a.href=p.dataUrl; a.download=p.filename; a.click(); toast('Photo download started'); }
function deletePhoto(pid){ const p=photos[pid]; if(!p) return; if(confirm('Delete this photo from local app storage?')){ delete photos[pid]; savePhotos(); if(detailId) renderDetail(); else render(); toast('Photo deleted'); } }
function openPhotoEntry(id,pid){
  const f=state.flocks.find(x=>x.id===id), p=photos[pid]; if(!f||!p) return;
  const b=document.getElementById('modalBackdrop'); const c=document.getElementById('modalContent');
  c.innerHTML=`<div class="modalHead"><div class="panelTitle">Chart Photo Entry — ${esc(f.farm)} ${esc(f.tank)}</div><button class="ghostBtn" onclick="closeModal()">Close</button></div><div class="photoEntryBox"><img src="${p.dataUrl}" alt="${esc(p.filename)}"><div class="meta">${esc(p.filename)} — pinch/zoom if your phone allows, then enter the row below.</div></div><div class="inlineHelp">Enter the chart row while looking at the photo. This does not transcribe; it just keeps the picture in your face.</div><div class="formGrid">${field('Week label','weekLabel','Week ')}<div class="field"><label>Week start date</label><input id="weekStart" type="date" onchange="setMortalityWeekFromStart()"><div class="dateHint" id="weekDateHint">Pick the first chart day for this row.</div></div>${field('Date span','dateSpan','')}${field('Weekly total','weeklyTotal','')}${field('Source','source','photo entry: '+p.filename)}</div><div class="formGrid">${DAYS.map(d=>field(d,`day_${d}`,'' )).join('')}</div><div class="field"><label><input type="checkbox" id="soFar"> Current week / so far</label></div><div class="field"><label><input type="checkbox" id="uncertain"> Uncertain / needs verify</label></div>${area('Notes','note',p.note||'')}<div class="toolbar"><button class="primaryBtn" onclick="saveMortalityFromPhoto('${f.id}','${p.id}')">Save Mortality Row</button><button class="ghostBtn" onclick="sharePhoto('${p.id}')">Send / Share Photo</button></div>`;
  b.classList.add('open');
}
function saveMortalityFromPhoto(id,pid){
  const f=state.flocks.find(x=>x.id===id), p=photos[pid]; if(!f||!p) return;
  const days={}; let sum=0; DAYS.forEach(d=>{const x=val('day_'+d); if(x){days[d]=x; const n=parseMortalityNumber(x); if(n!=null) sum+=n;}});
  const rawTotal=val('weeklyTotal'); const manual=parseMortalityNumber(rawTotal); const total=manual!=null?manual:(sum||null);
  const e=normalizeMortalityEntry({label:val('weekLabel')||'Week ?',dateSpan:val('dateSpan'),days,raw: rawTotal || (total==null?'?':String(total)),mortality:total,source:val('source')||('photo entry: '+p.filename),soFar:document.getElementById('soFar').checked,uncertain:document.getElementById('uncertain').checked || /\?|about|approx|likely/i.test(rawTotal),note:val('note')});
  f.mortalityEntries=f.mortalityEntries||[]; f.mortalityEntries.push(e); f.lastChartDate=e.dateSpan || p.date || f.lastChartDate; save(); closeModal(); detailTab='chart'; renderDetail(); toast('Mortality saved from photo');
}

function calculateMix(){
  const selection=val('mixFlock')||filters.mixFlock;
  const selected=mixSelectionFlocks(selection);
  const f=selected[0] || activeFlocks()[0];
  const p=productById(val('mixProduct')||filters.mixProduct);
  const head=parseFloat(String(val('mixHeadcount')).replace(/,/g,''));
  const gal1000=parseFloat(val('mixGal1000'));
  const ratio=parseFloat(val('mixRatio')||128);
  const bucket=parseFloat(val('mixBucket')||5);
  const days=parseFloat(val('mixDays')||1);
  const ran=parseFloat(val('mixRan')||0);
  const ages=selected.map(parseAgeWeeks).filter(x=>x!=null); const ageW=ages.length?Math.max(...ages):null;
  const warnings=[];
  if(!head || head<=0) warnings.push('Headcount missing/invalid — verify current count before leaving product.');
  if(!gal1000 || gal1000<=0) warnings.push('Gal/1,000 missing — enter water estimate for age/heat before using product amount.');
  if(!p.confirmed) warnings.push('Product dose is not confirmed in app — calculate buckets only; verify dose/SOP/label before mixing.');
  const hcInfo=getMixHeadcount(selected); if(hcInfo.uncertain) warnings.push('Selected headcount came from uncertain/about/range text or not every house has a count. Verify before sign-out/product amount.');
  const combinedText=selected.map(x=>(x.activeIssue||'')+' '+(x.currentMeds||'')+' '+(x.status||'')).join(' ').toLowerCase();
  const txt=(p.name+' '+combinedText).toLowerCase();
  if(/dimethox|albon/.test(txt) && ageW!=null && ageW>=11) warnings.push('Dimethox age warning: do not use after 11w unless office/vet directs.');
  if(/oxy|tetroxy/.test(txt) && /ort/.test(combinedText)) warnings.push('ORT reminder: ORT responds to Pen/R-Pen direction, not Oxytet/Oxy. Verify product choice.');
  if(ageW!=null && ageW>=13 && /heat|electrolyte|older/.test(combinedText)) warnings.push('Heat watch: 13w+ birds may need Electrolytes + C / fan checks per current heat guidance.');
  if(/copper/i.test(p.id) && ageW!=null && ageW<3) warnings.push('Copper Sulfate age warning from product sheet: do not give before 21 days of age.');
  if(/manage/i.test(p.id) && ageW!=null && ageW<1) warnings.push('Manage age warning from product sheet: do not give before 7 days of age.');
  if(/pen|oxy|tetroxy|dimethox|albon|lincomix|neomycin/i.test(p.id.toLowerCase())) warnings.push('Rx/sign-out reminder: drug room→truck no Rx; truck→farm requires Rx/sign-out.');
  let lines=[];
  lines.push(`Selection: ${selectedMixLabel(selection)}`);
  lines.push(`Product: ${p.name}`);
  if(p.use) lines.push(`Use: ${p.use}`);
  if(p.duration||p.withdrawal) lines.push(`Duration: ${p.duration||'?'} | Withdrawal: ${p.withdrawal||'?'}`);
  lines.push(`Headcount used: ${head||'?'} (${hcInfo.source})`);
  lines.push(`Age/week: ${ageW!=null?ageW+'w':'?'} | Medicator: 1:${ratio||'?'} | Bucket: ${bucket||'?'} gal`);
  if(head>0 && gal1000>0 && ratio>0 && bucket>0){
    const drink=head/1000*gal1000;
    const stock=drink/ratio;
    const buckets=stock/bucket;
    const remainingDays=Math.max(days-ran,0);
    const stockRemain=stock*remainingDays;
    lines.push('');
    lines.push(`Daily drinking water estimate: ${drink.toFixed(1)} gal/day`);
    lines.push(`Daily stock solution: ${stock.toFixed(2)} gal/day`);
    lines.push(`${bucket}-gal buckets/day: ${buckets.toFixed(2)}`);
    lines.push(`Remaining stock needed (${remainingDays} days): ${stockRemain.toFixed(2)} gal`);
    if(p.confirmed && p.doseType==='oz_per_stock_gal') lines.push(`Product needed: ${(stockRemain*p.dose).toFixed(1)} ${p.unit} (${p.dose} ${p.unit}/gal stock)`);
    else if(p.confirmed && p.doseType==='pack_per_stock_gal') lines.push(`Product needed: ${(stockRemain*p.dose).toFixed(1)} ${p.unit} (${p.dose} ${p.unit}/gal stock)`);
    else if(p.confirmed && p.doseType==='cups_per_stock_gal') lines.push(`Product needed: ${(stockRemain*p.dose).toFixed(1)} ${p.unit} (${p.dose} ${p.unit}/gal stock)`);
    else if(p.confirmed && p.doseType==='oz_range_per_stock_gal') lines.push(`Product needed range: ${(stockRemain*p.doseMin).toFixed(1)}–${(stockRemain*p.doseMax).toFixed(1)} ${p.unit} (${p.doseMin}–${p.doseMax} ${p.unit}/gal stock)`);
    else if(p.confirmed && p.doseType==='pack_range_per_stock_gal') lines.push(`Product needed range: ${(stockRemain*p.doseMin).toFixed(1)}–${(stockRemain*p.doseMax).toFixed(1)} ${p.unit} (${p.doseMin}–${p.doseMax} ${p.unit}/gal stock)`);
    else lines.push(`Product amount: DOSE NOT CONFIRMED — ${p.note}`);
  } else lines.push('Enter headcount + Gal/1,000 + ratio + bucket to calculate stock use.');
  if(warnings.length){ lines.push(''); lines.push('WARNINGS / VERIFY:'); warnings.forEach(w=>lines.push('• '+w)); }
  lines.push(''); lines.push('Dose note: '+p.note);
  document.getElementById('mixOut').textContent=lines.join('\n');
}

function downloadBackup(){ const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='vpgc-field-tracker-backup-'+new Date().toISOString().slice(0,10)+'.json'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); toast('Backup downloaded'); }
function importBackup(){ try{ const s=JSON.parse(val('importJson')); if(!s.flocks) throw new Error('No flocks array'); if(confirm('Import this backup and replace current local app data?')){ state=normalizeState(s); save(); detailId=null; view='today'; closeModal(); render(); toast('Backup imported'); }}catch(e){ alert('Could not import JSON: '+e.message); }}
function importBackupFile(file){ if(!file) return; const reader=new FileReader(); reader.onload=function(){ try{ const s=JSON.parse(reader.result); if(!s.flocks) throw new Error('No flocks array'); if(confirm('Import this JSON file and replace current local app data?')){ state=normalizeState(s); save(); detailId=null; view='today'; render(); toast('JSON file imported'); } }catch(e){ alert('Could not import JSON file: '+e.message); } }; reader.readAsText(file); }
window.addEventListener('click',e=>{ if(e.target.id==='modalBackdrop') closeModal(); });
render();
