<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>VPGC Field Tracker v1.2 Shell</title>
<style>
:root{--bg:#eef3ef;--card:#ffffff;--ink:#13201b;--muted:#66736d;--line:#d9e2dd;--green:#1f7a4d;--green2:#e8f5ee;--red:#b93a3a;--red2:#fdecec;--amber:#a96713;--amber2:#fff4df;--blue:#266fb3;--blue2:#eaf3ff;--purple:#6d4aa2;--purple2:#f1edff;--shadow:0 8px 25px rgba(19,32,27,.08);--radius:18px;}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;}button,input,select,textarea{font:inherit}button{cursor:pointer}.app{max-width:1080px;margin:0 auto;padding:14px 12px 88px}.topbar{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--bg) 72%,rgba(238,243,239,.7));padding:10px 0 8px;backdrop-filter:blur(6px)}.brand{display:flex;align-items:center;gap:10px}.logo{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--green),#3fa56f);display:grid;place-items:center;color:#fff;font-weight:900;box-shadow:var(--shadow)}.title{font-weight:900;font-size:22px;color:var(--green);line-height:1}.subtitle{font-size:12px;color:var(--muted);margin-top:2px}.topActions{margin-left:auto;display:flex;gap:8px}.iconBtn,.pillBtn,.primaryBtn,.dangerBtn,.ghostBtn{border:0;border-radius:999px;padding:10px 14px;background:#fff;color:var(--ink);box-shadow:0 2px 8px rgba(0,0,0,.05);font-weight:800}.primaryBtn{background:var(--green);color:white}.dangerBtn{background:var(--red);color:white}.ghostBtn{background:transparent;border:1px solid var(--line);box-shadow:none}.pillBtn.active{background:var(--green);color:white}.tabs{display:flex;gap:8px;overflow:auto;padding:10px 0 4px}.tab{white-space:nowrap;border:1px solid var(--line);background:#fff;color:var(--muted);padding:10px 12px;border-radius:999px;font-weight:900}.tab.active{background:var(--green);color:white;border-color:var(--green)}.grid{display:grid;gap:12px}.stats{grid-template-columns:repeat(4,minmax(0,1fr));margin-top:8px}.stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:var(--shadow)}.stat .num{font-size:25px;font-weight:1000;line-height:1;color:var(--green)}.stat .label{font-size:12px;color:var(--muted);font-weight:800}.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-top:12px}.panelHead{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}.panelTitle{font-weight:1000;font-size:18px}.sectionTitle{font-weight:1000;color:var(--green);margin:16px 0 8px;display:flex;align-items:center;gap:8px}.cards{display:grid;gap:10px}.farmCard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:0 3px 10px rgba(19,32,27,.04);display:grid;gap:8px}.farmCard.clickable{cursor:pointer}.farmCard.clickable:hover{border-color:#a8cabb}.cardTop{display:flex;justify-content:space-between;gap:10px}.farmName{font-weight:1000;font-size:16px}.tank{color:var(--green);font-weight:900}.meta{font-size:12px;color:var(--muted);line-height:1.35}.badges{display:flex;flex-wrap:wrap;gap:6px}.badge{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:5px 8px;font-size:11px;font-weight:1000;text-transform:uppercase;letter-spacing:.01em}.badge.issue{background:var(--red2);color:var(--red)}.badge.watch{background:var(--amber2);color:var(--amber)}.badge.active,.badge.good,.badge.complete{background:var(--green2);color:var(--green)}.badge.uncertain{background:var(--purple2);color:var(--purple)}.badge.product,.badge.rx{background:var(--blue2);color:var(--blue)}.badge.gut{background:#f1e6db;color:#7a3d16}.badge.heat{background:#fff1d6;color:#9d5d00}.noteLine{font-size:13px;color:#34433c;line-height:1.35}.searchRow{display:flex;gap:8px;position:sticky;top:108px;background:var(--bg);z-index:9;padding:8px 0}.search{width:100%;border:1px solid var(--line);border-radius:999px;padding:12px 14px;background:#fff;outline:none}.filterChips{display:flex;gap:8px;overflow:auto;padding:3px 0 8px}.chip{border:1px solid var(--line);border-radius:999px;background:#fff;color:var(--muted);padding:8px 10px;font-weight:900;font-size:13px;white-space:nowrap}.chip.active{background:var(--green);border-color:var(--green);color:#fff}.detailHeader{display:flex;align-items:start;gap:10px;margin-top:10px}.backBtn{border:0;background:#fff;border-radius:12px;padding:10px 12px;font-weight:1000;box-shadow:var(--shadow)}.detailTitle{font-size:24px;font-weight:1000;line-height:1.05}.detailSub{color:var(--muted);font-weight:800;margin-top:4px}.infoGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.info{background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px}.info .k{font-size:11px;color:var(--muted);font-weight:1000;text-transform:uppercase}.info .v{font-weight:900;font-size:13px;word-break:break-word;margin-top:4px}.seg{display:flex;gap:8px;margin-top:12px;overflow:auto}.seg button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 12px;font-weight:900;color:var(--muted)}.seg button.active{background:var(--green);color:#fff;border-color:var(--green)}.chartWrap{overflow:auto;border:1px solid var(--line);border-radius:16px;background:#fff}.chart{border-collapse:collapse;width:100%;min-width:760px}.chart th,.chart td{border:1px solid var(--line);padding:9px 8px;font-size:13px;text-align:left}.chart th{background:#f4f8f6;color:var(--green);font-weight:1000}.chart td.num{text-align:right;font-variant-numeric:tabular-nums}.chart tr.sofar td{background:#fff9ea}.chart tr.uncertain td{background:#f7f0ff}.chartMeta{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff;margin-bottom:10px}.chartMeta div{padding:9px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);font-size:12px}.chartMeta b{display:block;color:var(--muted);font-size:10px;text-transform:uppercase}.formGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.field label{display:block;font-size:12px;font-weight:1000;color:var(--muted);margin-bottom:5px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff;outline:none}.field textarea{min-height:88px}.modalBackdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:50;display:none;align-items:end}.modalBackdrop.open{display:flex}.modal{background:var(--bg);width:100%;max-height:92vh;overflow:auto;border-radius:24px 24px 0 0;padding:16px;box-shadow:0 -15px 35px rgba(0,0,0,.18)}.modalInner{max-width:720px;margin:0 auto}.modalHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.copyBox{white-space:pre-wrap;background:#0e1a15;color:#eef7f1;border-radius:16px;padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;line-height:1.45;overflow:auto}.productRow,.aminoRow,.coverageRow{display:grid;gap:5px;border:1px solid var(--line);background:#fff;border-radius:16px;padding:11px}.productRow{grid-template-columns:1fr auto}.rowTitle{font-weight:1000}.rowSub{font-size:12px;color:var(--muted)}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.footerNav{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);display:flex;justify-content:center;z-index:30;padding:7px 8px env(safe-area-inset-bottom)}.footerNav .navInner{max-width:720px;width:100%;display:grid;grid-template-columns:repeat(5,1fr);gap:4px}.navItem{border:0;background:transparent;border-radius:14px;color:var(--muted);padding:8px 4px;font-size:11px;font-weight:1000}.navItem.active{background:var(--green2);color:var(--green)}.empty{color:var(--muted);padding:18px;text-align:center}.toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);background:#0e1a15;color:#fff;padding:10px 14px;border-radius:999px;z-index:100;opacity:0;pointer-events:none;transition:.2s}.toast.show{opacity:1}@media (min-width:800px){.app{padding:18px 18px 96px}.cards{grid-template-columns:repeat(2,minmax(0,1fr))}.infoGrid{grid-template-columns:repeat(4,minmax(0,1fr))}.formGrid{grid-template-columns:repeat(3,minmax(0,1fr))}.modalBackdrop{align-items:center}.modal{border-radius:24px;max-width:760px;margin:auto}.stats{grid-template-columns:repeat(6,minmax(0,1fr))}}@media (max-width:540px){.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.chartMeta{grid-template-columns:repeat(2,1fr)}.formGrid{grid-template-columns:1fr}.title{font-size:19px}.topActions .ghostBtn{display:none}.farmCard{padding:11px}.panel{padding:12px}.searchRow{top:102px}.navItem{font-size:10px}}
</style>
</head>
<body>
<script id="seed-data" type="application/json">{"version": "v1.2-public-shell", "workingDate": "6/17/26", "generatedAt": "2026-06-18T00:24:02", "sourceFile": "Public-safe shell. Import private preload JSON locally.", "flocks": [], "products": [], "amino": [], "coverage": [], "closed": [], "uncertaintyFlags": ["No private route data is embedded in this public-safe shell. Use Backup → Import JSON File and choose vpgc_field_tracker_seed_6-17-26.json."], "settings": {"defaultDayStart": "Mon"}}</script>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="logo">V</div>
      <div><div class="title">VPGC Field Tracker</div><div id="sub" class="subtitle">Personal route + flock tracker</div></div>
      <div class="topActions"><button class="ghostBtn" onclick="openModal('quick')">Quick Note</button><button class="primaryBtn" onclick="openModal('flock')">+ Flock</button></div>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>
  <main id="main"><div class="panel"><div class="panelTitle">Loading VPGC Field Tracker…</div><p class="noteLine">If this never loads, open the file in Safari instead of a preview window.</p></div></main>
</div>
<div class="footerNav"><div class="navInner" id="foot"></div></div>
<div id="modalBackdrop" class="modalBackdrop"><div class="modal"><div class="modalInner" id="modalContent"></div></div></div>
<div id="toast" class="toast"></div>
<script>
window.addEventListener('error', function(e){
  const main=document.getElementById('main');
  if(main){ main.innerHTML = '<div class="panel"><div class="panelTitle">App hit an error</div><p class="noteLine">' + String(e.message || e.error || 'Unknown error') + '</p><p class="noteLine">Try opening this file in Safari instead of a file preview. If it still shows this, send me a screenshot.</p></div>'; }
});
const SEED = JSON.parse(document.getElementById('seed-data').textContent);
const STORE_KEY = 'vpgcFieldTracker.v1.2';
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
let storageOK = true;
let state = loadState();
let view = 'today';
let detailId = null;
let detailTab = 'chart';
let filters = {flock:'all', product:'all'};
let query = '';
const views = [
  ['today','Today','▣'],['flocks','Flocks','▤'],['products','Products','◈'],['meeting','Meeting','☰'],['backup','Backup','⇅']
];
function clone(x){ return JSON.parse(JSON.stringify(x)); }
function loadState(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(raw){ const s=JSON.parse(raw); if(s && s.flocks) return s; }
  }catch(e){ storageOK=false; console.warn('Local storage unavailable; using temporary in-memory mode.', e); }
  const fresh=clone(SEED); fresh.userCreatedAt = new Date().toISOString();
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(fresh)); }catch(e){ storageOK=false; console.warn('Could not save preload locally.', e); }
  return fresh;
}
function save(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); storageOK=true; }catch(e){ storageOK=false; console.warn('Save failed; use Download Backup if possible.', e); toast('Not saved locally — export backup'); } }
function resetSeed(){ if(confirm('Reset local app data back to the built-in shell/default? This overwrites local changes. Export a backup first if needed.')){ state=clone(SEED); save(); detailId=null; view='today'; render(); toast('Reset local data'); }}
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1700); }
function esc(s){ return String(s ?? '').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function oneLine(s,n=95){ s=String(s||'').replace(/\s+/g,' ').trim(); return s.length>n?s.slice(0,n-1)+'…':s; }
function activeFlocks(){ return state.flocks.filter(f=>!f.archived); }
function hasText(f,terms){ const t=Object.values(f).join(' ').toLowerCase(); return terms.some(x=>t.includes(x)); }
function bucketFor(f){
  const t=Object.values(f).join(' ').toLowerCase();
  if(/blackhead|bh risk|gut risk|enteritis|e\. coli/.test(t)) return 'late';
  if(/product pending|rx cleanup|sign-out pending|delivered\/on farm|planned|on truck/.test(t)) return 'hold';
  if(/issue|mortality jump|serious|on meds|processing next week|fresh chart needed|not chart-seen/.test(t)) return 'must';
  return 'nice';
}
function statusBadge(f){
  const s=(f.statusMain||f.status||'active').toLowerCase();
  let cls=s.includes('issue')?'issue':s.includes('watch')?'watch':s.includes('uncertain')?'uncertain':'active';
  return `<span class="badge ${cls}">${esc(s)}</span>`;
}
function flagBadges(f){
  const map={'on meds':'product','rx cleanup':'rx','product pending':'product','bh/gut risk':'gut','heat watch':'heat','uncertain':'uncertain'};
  return (f.flags||[]).slice(0,4).map(x=>`<span class="badge ${map[x]||'watch'}">${esc(x)}</span>`).join('');
}
function render(){ try{ renderShell(); if(detailId) return renderDetail(); const fn={today:renderToday, flocks:renderFlocks, products:renderProducts, meeting:renderMeeting, backup:renderBackup}[view] || renderToday; fn(); }catch(e){ console.error(e); document.getElementById('main').innerHTML='<div class="panel"><div class="panelTitle">Render error</div><p class="noteLine">'+esc(e.message||e)+'</p><p class="noteLine">Send this screenshot back to ChatGPT and I will patch it.</p></div>'; } }
function renderShell(){
  document.getElementById('sub').textContent=`${state.workingDate||''} • ${activeFlocks().length} active houses/tanks${storageOK?'':' • TEMP MODE'}`;
  document.getElementById('tabs').innerHTML=views.map(v=>`<button class="tab ${view===v[0]&&!detailId?'active':''}" onclick="go('${v[0]}')">${v[1]}</button>`).join('');
  document.getElementById('foot').innerHTML=views.slice(0,5).map(v=>`<button class="navItem ${view===v[0]&&!detailId?'active':''}" onclick="go('${v[0]}')"><div>${v[2]}</div><div>${v[1]}</div></button>`).join('');
}
function go(v){ view=v; detailId=null; detailTab='chart'; render(); window.scrollTo(0,0); }
function stats(){
  const fl=activeFlocks();
  return {active:fl.length, issue:fl.filter(f=>String(f.status).toLowerCase().includes('issue')).length, watch:fl.filter(f=>String(f.status).toLowerCase().includes('watch')).length, uncertain:fl.filter(f=>(f.flags||[]).includes('uncertain')).length, products:state.products.filter(p=>!/complete|signed out complete/i.test(p.status+' '+p.cleanupNote)).length, amino:state.amino.filter(a=>!/handled|do not rework/i.test(a.next+' '+a.cleanup)).length};
}
function statCards(obj){ return `<div class="grid stats">${Object.entries(obj).map(([k,v])=>`<div class="stat"><div class="num">${v}</div><div class="label">${esc(k)}</div></div>`).join('')}</div>`; }
function flockCard(f){
  return `<div class="farmCard clickable" onclick="openFlock('${f.id}')">
    <div class="cardTop"><div><div class="farmName">${esc(f.farm)} <span class="tank">${esc(f.tank)}</span></div><div class="meta">Flock ${esc(f.flockNo)} • ${esc(f.age)} • chart ${esc(f.lastChartDate)}</div></div><div>${statusBadge(f)}</div></div>
    <div class="badges">${flagBadges(f)}</div>
    <div class="noteLine"><b>Issue:</b> ${esc(oneLine(f.activeIssue,120))}</div>
    <div class="noteLine"><b>Amino:</b> ${esc(oneLine(f.aminoEnteredThrough,45))} → ${esc(oneLine(f.nextAminoNeeded,75))}</div>
  </div>`;
}
function openFlock(id){ detailId=id; detailTab='chart'; render(); window.scrollTo(0,0); }
function renderToday(){
  const s=stats(); const fl=activeFlocks();
  const buckets={must:['Must-do',[]], nice:['Nice-if-time',[]], hold:['Hold-for-product / cleanup',[]], late:['Late-day / BH-gut',[]]};
  fl.forEach(f=>buckets[bucketFor(f)][1].push(f));
  document.getElementById('main').innerHTML=`${statCards({'Active':s.active,'Issue':s.issue,'Watch':s.watch,'Cleanup':s.products,'Uncertain':s.uncertain,'Amino open':s.amino})}
    <div class="panel"><div class="panelHead"><div><div class="panelTitle">Today / Route Buckets</div><div class="meta">Generated from the 6/17 preload. Change status or close flocks as you go.</div></div><button class="primaryBtn" onclick="openModal('quick')">+ Quick note</button></div>
      ${Object.entries(buckets).map(([key,[title,items]])=>`<div class="sectionTitle">${esc(title)} <span class="badge ${key==='must'?'issue':key==='late'?'gut':key==='hold'?'product':'watch'}">${items.length}</span></div><div class="cards">${items.slice(0,12).map(flockCard).join('') || '<div class="empty">Nothing here.</div>'}</div>`).join('')}
    </div>
    <div class="panel"><div class="panelHead"><div class="panelTitle">Coverage This Week</div><button class="ghostBtn" onclick="copyCoverage()">Copy</button></div><div class="cards">${state.coverage.map(c=>`<div class="coverageRow"><div class="rowTitle">${esc(c.farm)}</div><div class="rowSub">Chart: ${esc(c.seenChart)} • Product drop: ${esc(c.productDrop)} • Not seen: ${esc(c.notSeen)}</div><div class="noteLine">${esc(c.notes)}</div></div>`).join('')}</div></div>`;
}
function renderFlocks(){
  const fl=activeFlocks().filter(f=>{
    const q=query.toLowerCase(); const matches=!q || Object.values(f).join(' ').toLowerCase().includes(q);
    const filt=filters.flock==='all' || (filters.flock==='issue' && String(f.status).toLowerCase().includes('issue')) || (filters.flock==='watch' && String(f.status).toLowerCase().includes('watch')) || (filters.flock==='uncertain' && (f.flags||[]).includes('uncertain')) || (filters.flock==='rx' && (f.flags||[]).includes('rx cleanup')) || (filters.flock==='bh' && (f.flags||[]).includes('bh/gut risk'));
    return matches && filt;
  });
  document.getElementById('main').innerHTML=`<div class="searchRow"><input class="search" placeholder="Search farm, tank, flock #, issue…" value="${esc(query)}" oninput="query=this.value; renderFlocks()"><button class="primaryBtn" onclick="openModal('flock')">+ Flock</button></div>
  <div class="filterChips">${['all','issue','watch','rx','bh','uncertain'].map(x=>`<button class="chip ${filters.flock===x?'active':''}" onclick="filters.flock='${x}'; renderFlocks()">${x}</button>`).join('')}</div>
  <div class="panel"><div class="panelHead"><div><div class="panelTitle">Active Flocks / Houses</div><div class="meta">Tap any house to open chart, notes, products, closeout.</div></div><span class="badge active">${fl.length} shown</span></div><div class="cards">${fl.map(flockCard).join('') || '<div class="empty">No matching flocks.</div>'}</div></div>`;
}
function renderProducts(){
  const filtersList=['all','on truck','delivered','rx pending','signed out','uncertain','cleanup'];
  const rows=state.products.filter(p=>{
    const t=(p.status+' '+p.rxStatus+' '+p.cleanupNote+' '+p.product+' '+p.farm).toLowerCase();
    return filters.product==='all' || t.includes(filters.product);
  });
  const summary={ 'Product rows':state.products.length, 'Rx pending':state.products.filter(p=>/rx.*pending|approval|rx cleanup/i.test(p.rxStatus+' '+p.status+' '+p.cleanupNote)).length, 'Cleanup open':state.products.filter(p=>!/complete|signed out complete/i.test(p.status+' '+p.cleanupNote)).length, 'Uncertain':state.products.filter(p=>/\?|uncertain|verify/i.test(JSON.stringify(p))).length };
  document.getElementById('main').innerHTML=`${statCards(summary)}<div class="panel"><div class="panelHead"><div><div class="panelTitle">Product / Rx / Sign-out Cleanup</div><div class="meta">Delivered product stays open until signed out/Rx/cleanup is marked complete.</div></div><button class="primaryBtn" onclick="openModal('product')">+ Product</button></div><div class="filterChips">${filtersList.map(x=>`<button class="chip ${filters.product===x?'active':''}" onclick="filters.product='${x}'; renderProducts()">${x}</button>`).join('')}</div><div class="cards">${rows.map(p=>productRow(p)).join('')}</div></div>`;
}
function productRow(p){
  const text=(p.status+' '+p.rxStatus+' '+p.cleanupNote).toLowerCase(); let cls=text.includes('rx')?'rx':text.includes('complete')?'complete':text.includes('uncertain')||text.includes('?')?'uncertain':text.includes('delivered')?'active':'product';
  return `<div class="productRow"><div><div class="rowTitle">${esc(p.date)} — ${esc(p.farm)}</div><div class="rowSub"><b>${esc(p.product)}</b> • ${esc(p.amount)}</div><div class="noteLine">${esc(p.cleanupNote)}</div></div><div class="badges"><span class="badge ${cls}">${esc(oneLine(p.status,24))}</span><span class="badge rx">${esc(oneLine(p.rxStatus,24))}</span></div></div>`;
}
function renderMeeting(){
  const issues=activeFlocks().filter(f=>/issue|watch|on meds|product pending|rx cleanup/i.test(f.status+' '+(f.flags||[]).join(' '))).slice(0,80);
  const meetingText=issues.map(f=>`${f.farm} ${f.tank} — ${f.meetingNote || f.activeIssue || 'No note'}`).join('\n');
  const aminoLines=state.amino.map(a=>`${a.farm} | ${a.tank} | ${a.enteredThrough} | Next: ${a.next}`).join('\n');
  document.getElementById('main').innerHTML=`<div class="panel"><div class="panelHead"><div><div class="panelTitle">Meeting Update</div><div class="meta">Health/mortality/product response only. Paperwork stays out unless relevant.</div></div><button class="primaryBtn" onclick="copyText(${JSON.stringify(meetingText)})">Copy Meeting</button></div><div class="cards">${issues.map(f=>`<div class="farmCard clickable" onclick="openFlock('${f.id}')"><div class="cardTop"><div><div class="farmName">${esc(f.farm)} <span class="tank">${esc(f.tank)}</span></div><div class="meta">${esc(f.age)} • ${esc(f.status)}</div></div>${statusBadge(f)}</div><div class="noteLine">${esc(f.meetingNote || f.activeIssue || '')}</div></div>`).join('')}</div></div><div class="panel"><div class="panelHead"><div><div class="panelTitle">Amino Helper Status</div><div class="meta">Preloaded current tracker status. Use flock detail to generate chart rows.</div></div><button class="ghostBtn" onclick="copyText(${JSON.stringify(aminoLines)})">Copy Amino Status</button></div><div class="copyBox">${esc(aminoLines)}</div></div>`;
}
function renderBackup(){
  const json=JSON.stringify(state,null,2);
  document.getElementById('main').innerHTML=`<div class="panel"><div class="panelTitle">Backup / Import</div><p class="noteLine">Use Export before major edits. This app saves on this browser only unless you export/import the JSON backup. For the public shell, import your private seed JSON here after opening the hosted app.</p><div class="toolbar"><button class="primaryBtn" onclick="downloadBackup()">Download Backup</button><button class="ghostBtn" onclick="copyText(JSON.stringify(state,null,2))">Copy JSON</button><label class="ghostBtn" for="backupFile">Import JSON File</label><input id="backupFile" type="file" accept="application/json,.json" style="display:none" onchange="importBackupFile(this.files[0])"><button class="dangerBtn" onclick="resetSeed()">Reset Local Data</button></div><div class="field"><label>Import backup JSON by paste</label><textarea id="importJson" placeholder="Paste exported JSON here"></textarea></div><div class="toolbar"><button class="primaryBtn" onclick="importBackup()">Import Pasted JSON</button></div></div><div class="panel"><div class="panelTitle">Big Uncertainty Flags</div><div class="cards">${(state.uncertaintyFlags||[]).map(x=>`<div class="farmCard"><div class="noteLine">${esc(x)}</div></div>`).join('') || '<div class="empty">No uncertainty flags yet.</div>'}</div></div>`;
}
function renderDetail(){
  const f=state.flocks.find(x=>x.id===detailId); if(!f){detailId=null; return render();}
  const tabs=['chart','overview','notes','products','closeout'];
  document.getElementById('main').innerHTML=`<div class="detailHeader"><button class="backBtn" onclick="detailId=null; render()">←</button><div><div class="detailTitle">${esc(f.farm)}</div><div class="detailSub">Tank/House ${esc(f.tank)} • Flock ${esc(f.flockNo)}</div><div class="badges" style="margin-top:8px">${statusBadge(f)}${flagBadges(f)}</div></div></div><div class="seg">${tabs.map(t=>`<button class="${detailTab===t?'active':''}" onclick="detailTab='${t}'; renderDetail()">${t}</button>`).join('')}</div><div id="detailBody"></div>`;
  const fn={chart:detailChart, overview:detailOverview, notes:detailNotes, products:detailProducts, closeout:detailCloseout}[detailTab];
  document.getElementById('detailBody').innerHTML=fn(f);
}
function metaBlock(f){return `<div class="chartMeta"><div><b>Farm</b>${esc(f.farm)}</div><div><b>Tank</b>${esc(f.tank)}</div><div><b>Flock #</b>${esc(f.flockNo)}</div><div><b>Start</b>${esc(f.originalStart)}</div><div><b>Move date</b>${esc(f.moveDate)}</div><div><b>Headcount</b>${esc(f.startHeadcount)}</div><div><b>Age</b>${esc(f.age)}</div><div><b>Last chart</b>${esc(f.lastChartDate)}</div><div><b>Current count</b>${esc(f.estimatedCurrentCount)}</div></div>`;}
function detailChart(f){
  const entries=f.mortalityEntries||[];
  const rows=entries.map(e=>`<tr class="${e.soFar?'sofar':''} ${e.uncertain?'uncertain':''}"><td><b>${esc(e.label)}</b>${e.soFar?' <span class="badge watch">so far</span>':''}${e.uncertain?' <span class="badge uncertain">?</span>':''}</td><td></td><td></td><td></td><td></td><td></td><td></td><td class="num">${esc(e.mortality??e.raw)}</td></tr>`).join('') || `<tr><td colspan="8" class="empty">No mortality rows yet. Add weekly/daily entry below.</td></tr>`;
  const aminoRows=entries.filter(e=>e.mortality!=null && !e.label.toLowerCase().includes('total')).map(e=>`${f.farm} | ${f.tank} | ${e.label} | ${e.mortality}${e.soFar?' so far':''} | ${f.estimatedCurrentCount||'?'}`).join('\n') || `${f.farm} | ${f.tank} | Week ? | ? | ${f.estimatedCurrentCount||'?'}`;
  return `<div class="panel">${metaBlock(f)}<div class="toolbar"><button class="primaryBtn" onclick="openModal('mortality','${f.id}')">+ Add Mortality</button><button class="ghostBtn" onclick="openModal('chartImport','${f.id}')">Paste Chart Import</button><button class="ghostBtn" onclick="copyText(${JSON.stringify(aminoRows)})">Copy Amino Rows</button></div><div class="chartWrap"><table class="chart"><thead><tr><th>Week</th>${DAYS.map(d=>`<th>${d}</th>`).join('')}<th>Total</th></tr></thead><tbody>${rows}</tbody></table></div><div class="panel" style="box-shadow:none;margin-top:12px"><div class="panelTitle">Amino rows from this chart</div><div class="copyBox">${esc(aminoRows)}</div></div></div>`;
}
function detailOverview(f){
  const keys=[['Status',f.status],['Original start/birthday',f.originalStart],['Move date',f.moveDate],['Age',f.age],['Start/headcount',f.startHeadcount],['Estimated current count',f.estimatedCurrentCount],['Source/brood farm',f.sourceBroodFarm],['Last chart/photo date',f.lastChartDate],['Chart week shown',f.chartWeekShown],['Amino through',f.aminoEnteredThrough],['Next Amino',f.nextAminoNeeded],['Current meds/products',f.currentMeds],['Treatment start/day',f.treatmentStart]];
  return `<div class="panel"><div class="panelHead"><div class="panelTitle">Overview</div><button class="ghostBtn" onclick="openModal('editFlock','${f.id}')">Edit</button></div><div class="infoGrid">${keys.map(([k,v])=>`<div class="info"><div class="k">${esc(k)}</div><div class="v">${esc(v)}</div></div>`).join('')}</div><div class="sectionTitle">Active Issue</div><div class="noteLine">${esc(f.activeIssue)}</div><div class="sectionTitle">Uncertainties</div><div class="noteLine">${esc(f.uncertainties)}</div></div>`;
}
function detailNotes(f){
  const notes=[['Route/field notes',f.routeNotes],['Meeting-ready note',f.meetingNote],['Product cleanup',f.productCleanup],['Mortality summary',f.mortalitySummary]].concat((f.customNotes||[]).map(n=>[n.date||'Custom note',n.text]));
  return `<div class="panel"><div class="panelHead"><div class="panelTitle">Notes</div><button class="primaryBtn" onclick="openModal('note','${f.id}')">+ Note</button></div><div class="cards">${notes.map(([k,v])=>`<div class="farmCard"><div class="rowTitle">${esc(k)}</div><div class="noteLine">${esc(v)}</div></div>`).join('')}</div></div>`;
}
function detailProducts(f){ const rows=state.products.filter(p=>(p.farm||'').toLowerCase().includes((f.farm||'').split('/')[0].trim().toLowerCase()) || (f.farm||'').toLowerCase().includes((p.farm||'').split('/')[0].trim().toLowerCase())); return `<div class="panel"><div class="panelHead"><div class="panelTitle">Related Product Logs</div><button class="primaryBtn" onclick="openModal('product')">+ Product</button></div><div class="cards">${rows.map(productRow).join('') || '<div class="empty">No related product rows found.</div>'}</div></div>`; }
function detailCloseout(f){ return `<div class="panel"><div class="panelTitle">Close / Archive Flock</div><p class="noteLine">Closing hides this flock from active route lists but keeps charts, notes, products, and history searchable in the backup.</p><div class="toolbar"><button class="dangerBtn" onclick="openModal('closeFlock','${f.id}')">Close this flock</button></div></div>`; }
function openModal(type,id){
  const b=document.getElementById('modalBackdrop'); const c=document.getElementById('modalContent');
  const f=id?state.flocks.find(x=>x.id===id):null;
  const close=`<button class="ghostBtn" onclick="closeModal()">Close</button>`;
  if(type==='flock') c.innerHTML=`<div class="modalHead"><div class="panelTitle">Add Flock</div>${close}</div><div class="formGrid">${field('Farm','farm')}${field('House/Tank','tank')}${field('Flock #','flockNo')}${field('Original start/birthday','originalStart')}${field('Move date','moveDate')}${field('Start/headcount','startHeadcount')}${field('Age','age')}${field('Status','status','active / watch')}${field('Last chart/photo date','lastChartDate')}</div>${area('Active issue','activeIssue')}${area('Uncertainties/mismatches','uncertainties')}<div class="toolbar"><button class="primaryBtn" onclick="saveNewFlock()">Save Flock</button></div>`;
  if(type==='editFlock'&&f) c.innerHTML=`<div class="modalHead"><div class="panelTitle">Edit ${esc(f.farm)} ${esc(f.tank)}</div>${close}</div><div class="formGrid">${field('Farm','farm',f.farm)}${field('House/Tank','tank',f.tank)}${field('Flock #','flockNo',f.flockNo)}${field('Original start/birthday','originalStart',f.originalStart)}${field('Move date','moveDate',f.moveDate)}${field('Start/headcount','startHeadcount',f.startHeadcount)}${field('Age','age',f.age)}${field('Status','status',f.status)}${field('Last chart/photo date','lastChartDate',f.lastChartDate)}${field('Amino entered through','aminoEnteredThrough',f.aminoEnteredThrough)}${field('Next Amino needed','nextAminoNeeded',f.nextAminoNeeded)}</div>${area('Active issue','activeIssue',f.activeIssue)}${area('Current meds/products','currentMeds',f.currentMeds)}${area('Uncertainties/mismatches','uncertainties',f.uncertainties)}<div class="toolbar"><button class="primaryBtn" onclick="saveEditFlock('${f.id}')">Save Changes</button></div>`;
  if(type==='mortality'&&f) c.innerHTML=`<div class="modalHead"><div class="panelTitle">Add Mortality — ${esc(f.farm)} ${esc(f.tank)}</div>${close}</div><div class="formGrid">${field('Week label','weekLabel','Week ')}${field('Date span','dateSpan','')}${field('Weekly total','weeklyTotal','')}${field('Source','source','manual entry')}</div><div class="formGrid">${DAYS.map(d=>field(d,`day_${d}`,'')).join('')}</div><div class="field"><label><input type="checkbox" id="soFar"> Current week / so far</label></div><div class="field"><label><input type="checkbox" id="uncertain"> Uncertain / needs verify</label></div>${area('Notes','note','')}<div class="toolbar"><button class="primaryBtn" onclick="saveMortality('${f.id}')">Add Row</button></div>`;
  if(type==='chartImport'&&f) c.innerHTML=`<div class="modalHead"><div class="panelTitle">Paste Chart Import — ${esc(f.farm)} ${esc(f.tank)}</div>${close}</div><p class="noteLine">Paste a block from ChatGPT like FARM/TANK/DAYS/TOTAL_SO_FAR. I’ll parse the week and days into this flock.</p><div class="field"><label>Import block</label><textarea id="chartBlock" style="min-height:220px" placeholder="FARM: Cobblestone #1\nTANK: 1038\nCHART_WEEK: 3\nDATE_SPAN: 6/13/26-6/19/26\nDAYS: Sat=6, Sun=2, Mon=18, Tue=133, Wed=85 so far\nTOTAL_SO_FAR: 244"></textarea></div><div class="toolbar"><button class="primaryBtn" onclick="importChartBlock('${f.id}')">Import to Chart</button></div>`;
  if(type==='note'&&f) c.innerHTML=`<div class="modalHead"><div class="panelTitle">Add Note — ${esc(f.farm)} ${esc(f.tank)}</div>${close}</div>${field('Date','noteDate',new Date().toLocaleDateString())}${area('Note','noteText','')}<div class="toolbar"><button class="primaryBtn" onclick="saveNote('${f.id}')">Save Note</button></div>`;
  if(type==='quick') c.innerHTML=`<div class="modalHead"><div class="panelTitle">Quick Note</div>${close}</div><div class="field"><label>Attach to flock</label><select id="quickFlock"><option value="">General / no flock</option>${activeFlocks().map(f=>`<option value="${f.id}">${esc(f.farm)} ${esc(f.tank)}</option>`).join('')}</select></div>${area('Note','quickNote','')}<div class="toolbar"><button class="primaryBtn" onclick="saveQuickNote()">Save Note</button></div>`;
  if(type==='product') c.innerHTML=`<div class="modalHead"><div class="panelTitle">Add Product Log</div>${close}</div><div class="formGrid">${field('Date','pDate',new Date().toLocaleDateString())}${field('Farm','pFarm')}${field('Product','pProduct')}${field('Amount','pAmount')}${field('Status','pStatus','delivered/on farm')}${field('Rx status','pRx','no Rx noted')}</div>${area('Cleanup note','pCleanup','')}<div class="toolbar"><button class="primaryBtn" onclick="saveProduct()">Save Product</button></div>`;
  if(type==='closeFlock'&&f) c.innerHTML=`<div class="modalHead"><div class="panelTitle">Close ${esc(f.farm)} ${esc(f.tank)}</div>${close}</div><div class="formGrid">${field('Close date','closeDate',new Date().toLocaleDateString())}${field('Reason','closeReason','sold / moved out / no birds')}${field('Final mortality','finalMort','')}${field('Final current count','finalCount',f.estimatedCurrentCount||'')}${field('Amino entered through','finalAmino',f.aminoEnteredThrough||'')}</div>${area('Final note','finalNote','')}<div class="toolbar"><button class="dangerBtn" onclick="closeFlock('${f.id}')">Archive Flock</button></div>`;
  b.classList.add('open');
}
function field(label,id,val=''){return `<div class="field"><label>${esc(label)}</label><input id="${id}" value="${esc(val)}"></div>`}
function area(label,id,val=''){return `<div class="field" style="margin-top:10px"><label>${esc(label)}</label><textarea id="${id}">${esc(val)}</textarea></div>`}
function closeModal(){ document.getElementById('modalBackdrop').classList.remove('open'); document.getElementById('modalContent').innerHTML=''; }
function val(id){ const el=document.getElementById(id); return el?el.value.trim():''; }
function saveNewFlock(){
  const farm=val('farm'), tank=val('tank'); if(!farm||!tank) return alert('Farm and house/tank are required.');
  const conflict=activeFlocks().find(f=>f.farm.toLowerCase()===farm.toLowerCase() && f.tank.toLowerCase()===tank.toLowerCase());
  if(conflict && !confirm('Active flock already exists for this farm/tank. Add anyway as correction/new flock?')) return;
  const f={id:'user-'+Date.now(),index:state.flocks.length+1,farm,tank,flockNo:val('flockNo')||'?',status:val('status')||'active',statusMain:'active',flags:[],originalStart:val('originalStart')||'?',moveDate:val('moveDate')||'?',age:val('age')||'?',startHeadcount:val('startHeadcount')||'?',estimatedCurrentCount:'?',sourceBroodFarm:'?',lastChartDate:val('lastChartDate')||'?',chartWeekShown:'?',aminoEnteredThrough:'?',nextAminoNeeded:'?',currentMeds:'?',treatmentStart:'?',activeIssue:val('activeIssue')||'?',mortalitySummary:'',mortalityEntries:[],productCleanup:'?',routeNotes:'?',meetingNote:'?',uncertainties:val('uncertainties')||'?',chartDayStart:'Mon',archived:false,close:null,customNotes:[]};
  state.flocks.push(f); save(); closeModal(); openFlock(f.id); toast('Flock added');
}
function saveEditFlock(id){ const f=state.flocks.find(x=>x.id===id); if(!f) return; ['farm','tank','flockNo','originalStart','moveDate','startHeadcount','age','status','lastChartDate','aminoEnteredThrough','nextAminoNeeded','activeIssue','currentMeds','uncertainties'].forEach(k=>f[k]=val(k)||'?'); f.statusMain=f.status.toLowerCase().includes('issue')?'issue':f.status.toLowerCase().includes('watch')?'watch':'active'; save(); closeModal(); renderDetail(); toast('Flock updated'); }
function saveMortality(id){ const f=state.flocks.find(x=>x.id===id); if(!f) return; const days={}; let sum=0; DAYS.forEach(d=>{const x=val('day_'+d); if(x){days[d]=x; const n=parseInt(x.replace(/[^0-9-]/g,'')); if(!isNaN(n)) sum+=n;}}); const manual=parseInt(val('weeklyTotal').replace(/[^0-9-]/g,'')); const total=!isNaN(manual)?manual:(sum||null); const e={label:val('weekLabel')||'Week ?',dateSpan:val('dateSpan'),days,raw: total==null?'?':String(total),mortality:total,source:val('source')||'manual entry',soFar:document.getElementById('soFar').checked,uncertain:document.getElementById('uncertain').checked,note:val('note')}; f.mortalityEntries=f.mortalityEntries||[]; f.mortalityEntries.push(e); f.lastChartDate=e.dateSpan || f.lastChartDate; save(); closeModal(); renderDetail(); toast('Mortality added'); }
function importChartBlock(id){ const f=state.flocks.find(x=>x.id===id); const block=val('chartBlock'); if(!f||!block) return; const find=(key)=>{const m=block.match(new RegExp('^'+key+'\\s*:\\s*(.+)$','mi'));return m?m[1].trim():''}; const week=find('CHART_WEEK')||find('WEEK')||'?'; const span=find('DATE_SPAN')||''; const daysRaw=find('DAYS')||''; const totalRaw=find('TOTAL_SO_FAR')||find('TOTAL')||''; const days={}; daysRaw.split(',').forEach(part=>{const m=part.trim().match(/([A-Za-z]{2,3})\s*=\s*(.+)/); if(m) days[m[1]]=m[2].trim();}); let total=parseInt((totalRaw||'').replace(/[^0-9-]/g,'')); if(isNaN(total)){ let sum=0; Object.values(days).forEach(v=>{const n=parseInt(String(v).replace(/[^0-9-]/g,'')); if(!isNaN(n)) sum+=n;}); total=sum||null; } const e={label:String(week).toLowerCase().includes('week')?week:'Week '+week,dateSpan:span,days,raw:total==null?'?':String(total),mortality:total,source:'ChatGPT chart import',soFar:/so far|current|partial/i.test(block),uncertain:/\?|uncertain|hard to read|likely|about/i.test(block),note:find('NOTES')||''}; f.mortalityEntries=f.mortalityEntries||[]; f.mortalityEntries.push(e); if(span) f.lastChartDate=span; save(); closeModal(); renderDetail(); toast('Chart import added'); }
function saveNote(id){ const f=state.flocks.find(x=>x.id===id); if(!f) return; f.customNotes=f.customNotes||[]; f.customNotes.push({date:val('noteDate')||new Date().toLocaleDateString(),text:val('noteText')}); save(); closeModal(); detailTab='notes'; renderDetail(); toast('Note saved'); }
function saveQuickNote(){ const id=val('quickFlock'), text=val('quickNote'); if(!text) return alert('Add a note first.'); if(id){ const f=state.flocks.find(x=>x.id===id); f.customNotes=f.customNotes||[]; f.customNotes.push({date:new Date().toLocaleString(),text}); detailId=id; detailTab='notes'; } else { state.generalNotes=state.generalNotes||[]; state.generalNotes.push({date:new Date().toLocaleString(),text}); } save(); closeModal(); render(); toast('Quick note saved'); }
function saveProduct(){ const p={id:'product-'+Date.now(),date:val('pDate')||'?',farm:val('pFarm')||'?',product:val('pProduct')||'?',amount:val('pAmount')||'?',status:val('pStatus')||'?',rxStatus:val('pRx')||'?',cleanupNote:val('pCleanup')||'?'}; state.products.unshift(p); save(); closeModal(); view='products'; detailId=null; render(); toast('Product saved'); }
function closeFlock(id){ const f=state.flocks.find(x=>x.id===id); if(!f) return; f.archived=true; f.close={date:val('closeDate')||'?',reason:val('closeReason')||'?',finalMortality:val('finalMort')||'?',finalCount:val('finalCount')||'?',aminoThrough:val('finalAmino')||'?',note:val('finalNote')||''}; state.closed.unshift({id:'closed-'+Date.now(),farm:f.farm,tank:f.tank,closeDate:f.close.date,reason:f.close.reason,notes:f.close.note}); save(); closeModal(); detailId=null; view='flocks'; render(); toast('Flock archived'); }
function copyText(txt){ navigator.clipboard?.writeText(txt).then(()=>toast('Copied')).catch(()=>{prompt('Copy this:',txt);}); }
function copyCoverage(){ copyText(state.coverage.map(c=>`${c.farm} | chart ${c.seenChart} | drop ${c.productDrop} | not seen ${c.notSeen} | ${c.notes}`).join('\n')); }
function downloadBackup(){ const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='vpgc-field-tracker-backup-'+new Date().toISOString().slice(0,10)+'.json'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); toast('Backup downloaded'); }
function importBackup(){ try{ const s=JSON.parse(val('importJson')); if(!s.flocks) throw new Error('No flocks array'); if(confirm('Import this backup and replace current local app data?')){ state=s; save(); detailId=null; view='today'; closeModal(); render(); toast('Backup imported'); }}catch(e){ alert('Could not import JSON: '+e.message); }}
function importBackupFile(file){ if(!file) return; const reader=new FileReader(); reader.onload=function(){ try{ const s=JSON.parse(reader.result); if(!s.flocks) throw new Error('No flocks array'); if(confirm('Import this JSON file and replace current local app data?')){ state=s; save(); detailId=null; view='today'; render(); toast('JSON file imported'); } }catch(e){ alert('Could not import JSON file: '+e.message); } }; reader.readAsText(file); }
window.addEventListener('click',e=>{ if(e.target.id==='modalBackdrop') closeModal(); });
render();
</script>
</body>
</html>
